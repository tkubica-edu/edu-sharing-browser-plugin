<header class="topbar">
  <img class="logo" src="../icons/32.png" alt="" (error)="onLogoError($event)" />
  <span class="title">Edu-Sharing</span>
  <button class="close" title="Schließen" aria-label="Schließen" (click)="close()">✕</button>
</header>

<es-status-bar></es-status-bar>

<!-- Workflow-step header: always shows the current view's title for consistency; the
     back-to-menu button appears on every view except the menu itself. -->
<div class="step-header">
  <button class="back-btn" *ngIf="nav.showBack()" (click)="nav.openMenu()"
          title="Zurück zu Aktionen & Optionen" aria-label="Zurück zu Aktionen & Optionen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5l-7 7 7 7" /></svg>
  </button>
  <h2 class="step-title">{{ nav.title() }}</h2>
</div>

<!-- Dispatch on dispatchKey(): 'menu', a built-in screen id, or 'extension' when the
     current option carries a custom (element/iframe) view — the latter also covers a
     contributed option that replaced a built-in id. -->
<main class="content" [ngSwitch]="dispatchKey()">
  <es-menu *ngSwitchCase="'menu'"></es-menu>
  <es-login *ngSwitchCase="'login'"></es-login>
  <es-erschliessen-screen *ngSwitchCase="'erschliessen'"></es-erschliessen-screen>
  <es-metadaten-screen *ngSwitchCase="'metadaten'"></es-metadaten-screen>
  <es-vorschau-screen *ngSwitchCase="'vorschau'"></es-vorschau-screen>
  <es-einsortieren-screen *ngSwitchCase="'einsortieren'"></es-einsortieren-screen>
  <es-search *ngSwitchCase="'suchen'" [contextUrl]="ui.activeUrl()"></es-search>
  <es-history *ngSwitchCase="'verlauf'" (open)="openInWizard($event)"></es-history>
  <es-settings *ngSwitchCase="'einstellungen'"></es-settings>
  <es-extension-view-host *ngSwitchCase="'extension'" [option]="currentOption()!"></es-extension-view-host>
</main>

<es-action-bar></es-action-bar>

<div class="preview-wrap">
  <p class="muted" *ngIf="!ready() && !error()">Vorschau wird geladen…</p>
  <p class="error" *ngIf="error()">Vorschau konnte nicht geladen werden: {{ error() }}</p>

  <edu-sharing-preview-sidebar *ngIf="ready()"
                               [node]="node" [editorMode]="'viewer'"></edu-sharing-preview-sidebar>
</div>

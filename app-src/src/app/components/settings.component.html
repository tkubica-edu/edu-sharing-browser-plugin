<section class="es-card">
  <label class="es-field-label" for="repo-url">Repository-URL <span class="es-req">*</span></label>
  <input id="repo-url" type="url" class="es-input" [(ngModel)]="repoUrl"
         (change)="onRepoChange()" placeholder="https://…/edu-sharing"
         [class.invalid]="touched && !repoUrl.trim()" />
  <p class="es-hint" *ngIf="touched && !repoUrl.trim()">Die Repository-URL ist erforderlich.</p>
  <p class="desc">
    Basis-URL des edu-sharing Repositoriums. Wird für die Anmeldung verwendet.
  </p>

  <div class="es-notice" *ngIf="auth.state().needsReload">
    <span>Repository geändert. Zum Übernehmen neu laden.</span>
    <button class="es-btn es-btn--tonal es-btn--small" (click)="applyRepo()">Übernehmen</button>
  </div>

  <div class="es-row">
    <button class="es-btn es-btn--text" (click)="resetDefault()">Auf Standard zurücksetzen</button>
  </div>
</section>

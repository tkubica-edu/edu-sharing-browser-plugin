<div class="selector-wrap">
  @if (error()) {
    <p class="error">Sammlungen konnten nicht geladen werden: {{ error() }}</p>
  }

  @if (option) {
    <edu-sharing-nodes-selector
      [option]="option"
      [tabBlacklist]="tabBlacklist"
      [primaryMode]="'collections'"
    ></edu-sharing-nodes-selector>
  }
</div>

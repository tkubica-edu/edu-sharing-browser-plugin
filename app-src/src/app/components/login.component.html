<!-- Logged out: credential form. Logged in: compact status + logout. -->
<ng-container *ngIf="!auth.state().loggedIn; else loggedIn">
  <section class="card">
    <div class="card-head">
      <h2>Anmeldung</h2>
      <span class="badge badge-guest">Nicht angemeldet</span>
    </div>

    <input type="text" class="input" [(ngModel)]="username" placeholder="Benutzername" autocomplete="username" />
    <input type="password" class="input" [(ngModel)]="password" placeholder="Passwort"
           autocomplete="current-password" (keyup.enter)="login()" />
    <p class="error" *ngIf="auth.state().error">{{ auth.state().error }}</p>

    <div class="row">
      <button class="btn btn-primary" (click)="login()"
              [disabled]="loggingIn() || !username || !password || auth.state().needsReload">
        {{ loggingIn() ? 'Anmelden…' : 'Anmelden' }}
      </button>
      <span class="muted">Anmeldung ist erforderlich.</span>
    </div>

    <p class="hint" *ngIf="auth.state().needsReload">
      Repository geändert – bitte in „Einstellungen" übernehmen, um dich anzumelden.
    </p>
  </section>
</ng-container>

<ng-template #loggedIn>
  <div class="status">
    <span class="badge badge-user">Angemeldet</span>
    <span class="muted">als <strong>{{ auth.state().username }}</strong></span>
    <button class="btn-text" (click)="logout()">Abmelden</button>
  </div>
</ng-template>

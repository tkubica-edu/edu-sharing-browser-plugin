<div class="mds-wrap">
  <p class="muted" *ngIf="!ready() && !error()">Editor wird geladen…</p>
  <p class="error" *ngIf="error()">Editor konnte nicht geladen werden: {{ error() }}</p>

  <!--
    <edu-sharing-mds-editor-wrapper> is created imperatively (see mount()) instead of
    used as a template tag: as an @angular/elements custom element its ngOnInit runs on
    connect (appendChild) and THROWS unless `embedded`/`currentValues` are already set.
    Template property bindings are applied only AFTER connect, so they'd be too late.
    Creating it and setting inputs before appending guarantees they're there in time.
  -->
  <div #host class="mds-host"></div>

  <div class="mds-actions" *ngIf="ready()">
    <button class="btn-save" type="button" (click)="onSave()">Speichern</button>
    <button class="btn-reset" type="button" (click)="onReset()">Zurücksetzen</button>
  </div>
</div>

<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <!-- Resolve bundle assets relative to this folder. -->
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <script src="mds-env.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; height: 100%; }
    #selector-root { height: 100%; }
  </style>
</head>
<body>
  <div id="selector-root"></div>
  <!-- edu-sharing web component bundle (registers <edu-sharing-nodes-selector>) -->
  <script src="scripts.js" defer></script>
  <script src="polyfills.js" type="module"></script>
  <script src="main.js" type="module"></script>
  <!-- bridge runs after the bundle; waits for the element to be defined -->
  <script src="selector-bridge.js" defer></script>
</body>
</html>
